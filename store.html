<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja</title>
    <link rel="stylesheet" href="store.css">
</head>
<body>

    <header class="navbar">
        <div class="logo">
            <a href="#">
                <img src="sua-logo.png" alt="logoimg" class="logo-img">
            </a>
        </div>
        
        <nav>
            <ul class="nav-links">
                <li><a href="home.html">Home</a></li>
                <li><a href="store.html">Store</a></li>
                <li><a href="#">News</a></li>
                <li><a href="#">Compatible</a></li>
                <li><a href="#">AI Support</a></li>
            </ul>
        </nav>

        <div class="search-container">
            <input type="text" placeholder="Pesquisar...">
            <button type="submit">Buscar</button>
        </div>
    </header>

    <main class="container">
        <section class="content-section section-amd">
            <h2>AMD</h2>
            <div class="card-grid">
                <div class="card">
                    <div class="card-image"><img src="IMGs\Ryzen 5 5600GT.png" alt="AMD Ryzen 5 5600GT"></div>
                    <div class="card-info">
                        <h3>AMD Ryzen 5 5600GT</h3>
                        <p class="price">R$879.00</p>
                        <button class="btn-buy">Comprar</button>
                    </div>
                </div>

                <div class="card">
                    <div class="card-image"><img src="IMGs\Ryzen 7 7800X3D.png" alt="Ryzen 7"></div>
                    <div class="card-info">
                        <h3>AMD Ryzen 7 7800X3D</h3>
                        <p class="price">R$2,220.00</p>
                        <button class="btn-buy">Comprar</button>
                    </div>
                </div>

                <div class="card">
                    <div class="card-image"><img src="IMGs\Ryzen 9 9950X3D.png" alt="Ryzen 9"></div>
                    <div class="card-info">
                        <h3>AMD Ryzen 9 9950X3D</h3>
                        <p class="price">R$3,190.00</p>
                        <button class="btn-buy">Comprar</button>
                    </div>
                </div>
            </div>
        </section>
        
        <section class="content-section section-intel">
            <h2>Intel</h2>
            <div class="card-grid">
                <div class="card">
                    <div class="card-image"><img src="IMGs\Intel Core i5 14.png" alt="Intel 5"></div>
                    <div class="card-info">
                        <h3>Intel Core i5 14600F</h3>
                        <p class="price">R$1,599.00</p>
                        <button class="btn-buy">Comprar</button>
                    </div>
                </div>

                <div class="card">
                    <div class="card-image"><img src="IMGs\Intel core i7.webp" alt="Intel 7"></div>
                    <div class="card-info">
                        <h3>Intel Core i7 14700F</h3>
                        <p class="price">R$2,600.00</p>
                        <button class="btn-buy">Comprar</button>
                    </div>
                </div>

                <div class="card">
                    <div class="card-image"><img src="IMGs\Core i9.png" alt="intel 9"></div>
                    <div class="card-info">
                        <h3>Intel Core i9 14900F</h3>
                        <p class="price">R$3,680.00</p>
                        <button class="btn-buy">Comprar</button>
                    </div>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
