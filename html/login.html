<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Core Match</title>
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>
    <div class="centralizar-tela">
        <div class="caixa">
            <div class="header-caixa">
                <h2>Login</h2>
                <p>Bem-vindo de volta!</p>
            </div>
<div class="container">
        <form class="header-caixa" id="formLogin">
                <div class="grupo-input">
                    <label for="email">E-mail</label>
                    <input 
                    type="email" 
                    id="email" 
                    placeholder="exemplo@email.com" 
                    required>
                </div>

                <div class="grupo-input">
                    <div class="label-row">
                        <label for="senha">Senha</label>
                        <a href="#" class="esqueci-senha">Esqueceu?</a>
                    </div>
                    <input 
                    type="password" 
                    id="senha" 
                    placeholder="••••••••" 
                    required>
                </div>

                <button 
                type="submit" class="
                botao-primario">Entrar na Conta</button>

                <div class="divider">ou</div>

                <a href="../html/home.html" class="botao-secundario">
                    ← Voltar para a Home
                </a>
            </form>
            
            <div class="footer-caixa">
                Não tem uma conta? <a href="../html/cadastro.html">Cadastre-se</a>
            </div>
        </div>
    </div> 
    <script src="../js/login.js"></script>
</body>
</html>
