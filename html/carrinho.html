<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seu Carrinho</title>
    <link rel="stylesheet" href="../css/carrinho.css">
</head>
<body>

<header class="navbar">
    <div class="logo">
        <h1 style="color: var(--petronas-turq); font-size: 1.2rem;">Seu Carrinho</h1>
    </div>
    <ul class="nav-links">
        <li><a href="../html/home.html">Home</a></li>
        <li><a href="../html/store.html">Core Store</a></li>
        <li><a href="#">Suporte AI</a></li>
    </ul>
</header>

<main class="container cart-layout">
    <section class="cart-left">
        <h2 class="section-title">Meu Carrinho</h2>
        
        <div class="cart-card">
            <div class="cart-item-content">
                <img src="../img/KITXEON.png" alt="Produto" class="cart-img">
                <div class="cart-details">
                    <h3>Kit Placa mãe X99 + Xeon E5-2670 V3 + 16gb Ram</h3>
                    <p class="sku">CÓD: OC-7782</p>
                    <div class="qty-selector">
                        <button>-</button>
                        <span>1</span>
                        <button>+</button>
                    </div>
                </div>
                <div class="cart-price-area">
                    <span class="pix-label">À vista no PIX</span>
                    <span class="pix-value">R$ 450,00</span>
                    <span class="card-value">ou R$ 520,00 no cartão</span>
                </div>
            </div>
            <button class="remove-btn">Remover</button>
        </div>

        </section>

    <aside class="cart-right">
        <div class="summary-card">
            <h3>RESUMO</h3>
            <div class="summary-line">
                <span>Subtotal:</span>
                <span>R$ 520,00</span>
            </div>
            <div class="summary-line total">
                <span>TOTAL:</span>
                <span>R$ 520,00</span>
            </div>
            
            <div class="pix-box">
                <p>VALOR NO PIX</p>
                <span class="pix-final">R$ 450,00</span>
                <small>(Economize R$ 70,00)</small>
            </div>

            <button class="btn-finish">FINALIZAR COMPRA</button>
            <a href="#" class="btn-back">CONTINUAR COMPRANDO</a>
        </div>
    </aside>
</main>

</body>
</html>
